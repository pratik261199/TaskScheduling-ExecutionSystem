version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - scheduler_logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build:
      context: .
    command: celery -A celery_worker.app worker --loglevel=info
    volumes:
      - .:/app
      - scheduler_logs:/app/logs
    env_file:
      - .env
    depends_on:
      - redis

  beat:
    build:
      context: .
    command: celery -A celery_worker.app beat --loglevel=info
    volumes:
      - .:/app
      - scheduler_logs:/app/logs
    env_file:
      - .env
    depends_on:
      - redis

  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=scheduler_db

volumes:
  postgres_data:
  scheduler_logs:
