version: '3.8'

services:
  web:
    build:
      context: .
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
      - executor_logs:/app/logs
    ports:
      - "8001:8001"
    env_file:
      - ./.env
  postgres:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=executor_db

volumes:
  postgres_data:
  executor_logs:
